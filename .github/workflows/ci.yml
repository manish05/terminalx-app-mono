name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: ESLint
        run: npx eslint .

  test:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Unit tests
        run: npx vitest run --reporter=verbose

  smoke-test:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux

      - run: npm ci
      - run: npm run build

      - name: Start server and run smoke tests
        run: |
          # Start the server in background with no auth for smoke testing
          TERMINALX_AUTH_MODE=none NODE_ENV=production npx tsx server/index.ts &
          SERVER_PID=$!

          # Wait for server to be ready
          for i in $(seq 1 30); do
            if curl -s http://localhost:3000/health > /dev/null 2>&1; then
              echo "Server ready"
              break
            fi
            sleep 1
          done

          # Smoke test 1: Health endpoint returns 200
          echo "Test 1: Health endpoint"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/health)
          if [ "$STATUS" != "200" ]; then
            echo "FAIL: Health endpoint returned $STATUS"
            kill $SERVER_PID 2>/dev/null
            exit 1
          fi
          echo "PASS: Health endpoint returned 200"

          # Smoke test 2: Login endpoint exists (returns 400 since auth is disabled)
          echo "Test 2: Login endpoint"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Content-Type: application/json" \
            -d '{"username":"test","password":"test"}' \
            http://localhost:3000/api/auth/login)
          if [ "$STATUS" != "400" ]; then
            echo "FAIL: Login endpoint returned $STATUS (expected 400 with auth=none)"
            kill $SERVER_PID 2>/dev/null
            exit 1
          fi
          echo "PASS: Login endpoint returned 400 (auth disabled)"

          # Smoke test 3: Sessions API works
          echo "Test 3: Sessions API"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/api/sessions)
          if [ "$STATUS" != "200" ]; then
            echo "FAIL: Sessions API returned $STATUS"
            kill $SERVER_PID 2>/dev/null
            exit 1
          fi
          echo "PASS: Sessions API returned 200"

          echo "All smoke tests passed"
          kill $SERVER_PID 2>/dev/null

  docker-build:
    runs-on: ubuntu-latest
    needs: [test, smoke-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
