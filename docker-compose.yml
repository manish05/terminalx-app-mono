services:
  terminalx:
    build: .
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      # Persist user data and secrets across container restarts
      - terminalx-data:/app/data
      # Mount host home directory as the browsable root (customize as needed)
      - ${HOME:-/root}:/root
    environment:
      - PORT=3000
      - TERMINUS_ROOT=/root
      - TERMINUS_SHELL=/bin/bash
      - TERMINUS_MAX_SESSIONS=20
      - TERMINUS_READ_ONLY=false
      # Auth: set TERMINALX_ADMIN_PASSWORD before first startup.
      - TERMINALX_AUTH_MODE=${TERMINALX_AUTH_MODE:-local}
      # Required when TERMINALX_AUTH_MODE=local (first run creates this admin user)
      - TERMINALX_ADMIN_USERNAME=${TERMINALX_ADMIN_USERNAME:-admin}
      - TERMINALX_ADMIN_PASSWORD=${TERMINALX_ADMIN_PASSWORD:-}
      # Required when TERMINALX_AUTH_MODE=password
      - TERMINALX_PASSWORD=${TERMINALX_PASSWORD:-}
      # Optional; container entrypoint generates and persists one when absent
      - TERMINALX_JWT_SECRET=${TERMINALX_JWT_SECRET:-}
    restart: unless-stopped

volumes:
  terminalx-data:
